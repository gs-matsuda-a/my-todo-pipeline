<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- XSS protection: values are set using textContent and proper escaping (see public/app.js) -->
  <title>Todo App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
    }

    .hidden {
      display: none;
    }

    /* Auth Screens */
    .auth-container {
      text-align: center;
    }

    .auth-container h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .auth-container p {
      color: #666;
      margin-bottom: 30px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .auth-form input {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .auth-form input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .auth-form button {
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .auth-form button:hover {
      background: #5568d3;
    }

    .auth-toggle {
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .auth-toggle button {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      font-weight: 600;
      padding: 0;
      text-decoration: underline;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    /* Dashboard */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 20px;
    }

    .dashboard-header h1 {
      color: #333;
      font-size: 24px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-info span {
      color: #666;
      font-size: 14px;
    }

    .logout-btn {
      padding: 8px 16px;
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: #e0e0e0;
    }

    .add-task-form {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .add-task-form input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .add-task-form input:focus {
      outline: none;
      border-color: #667eea;
    }

    .add-task-form button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }

    .add-task-form button:hover {
      background: #5568d3;
    }

    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 15px;
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .task-item:hover {
      background: #f5f5f5;
    }

    .task-checkbox {
      margin-top: 3px;
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      color: #333;
      font-size: 14px;
      font-weight: 500;
      word-break: break-word;
      margin-bottom: 4px;
    }

    .task-title.completed {
      color: #999;
      text-decoration: line-through;
    }

    .task-meta {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    .task-meta-item {
      display: inline-block;
      margin-right: 12px;
    }

    .task-share-badge {
      display: inline-block;
      background: #e3f2fd;
      color: #1976d2;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .task-actions button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    .task-share-btn {
      background: #e3f2fd;
      color: #1976d2;
    }

    .task-share-btn:hover {
      background: #bbdefb;
    }

    .task-delete-btn {
      background: #ffebee;
      color: #c62828;
    }

    .task-delete-btn:hover {
      background: #ffcdd2;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 40px 20px;
      font-size: 14px;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 10px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .modal-content h2 {
      margin-bottom: 20px;
      color: #333;
      font-size: 18px;
    }

    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .modal-form input,
    .modal-form select {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .modal-form input:focus,
    .modal-form select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }

    .modal-submit {
      background: #667eea;
      color: white;
    }

    .modal-submit:hover {
      background: #5568d3;
    }

    .modal-cancel {
      background: #f0f0f0;
      color: #333;
    }

    .modal-cancel:hover {
      background: #e0e0e0;
    }

    .success-message {
      background: #efe;
      color: #3a3;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Auth Screen -->
  <div id="authScreen" class="container">
    <div class="auth-container">
      <h1>Todo App</h1>
      <p id="authToggleLabel">アカウントをお持ちですか？ログインしてください</p>

      <div id="errorBox"></div>

      <form id="loginForm" class="auth-form">
        <input type="text" id="loginUsername" placeholder="ユーザー名" required />
        <input type="password" id="loginPassword" placeholder="パスワード" required />
        <button type="submit">ログイン</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <input type="text" id="registerUsername" placeholder="ユーザー名" required />
        <input type="password" id="registerPassword" placeholder="パスワード" required />
        <button type="submit">登録</button>
      </form>

      <div class="auth-toggle">
        <span id="authToggleText">アカウントをお持ちでないですか？</span>
        <button type="button" id="authToggleBtn">登録する</button>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboardScreen" class="container hidden">
    <div class="dashboard-header">
      <h1>My Tasks</h1>
      <div class="user-info">
        <span id="currentUsername"></span>
        <button class="logout-btn" id="logoutBtn">ログアウト</button>
      </div>
    </div>

    <div id="successBox"></div>

    <div class="add-task-form">
      <input type="text" id="newTaskTitle" placeholder="新しいタスクを入力..." />
      <button id="addTaskBtn">追加</button>
    </div>

    <div id="tasksContainer" class="tasks-list"></div>
  </div>

  <!-- Share Modal -->
  <div id="shareModal" class="modal">
    <div class="modal-content">
      <h2>タスクを共有</h2>
      <form id="shareForm" class="modal-form">
        <input type="text" id="shareUsername" placeholder="共有相手のユーザー名" required />
        <select id="sharePermission">
          <option value="view">閲覧のみ</option>
          <option value="edit">編集可</option>
        </select>
        <div class="modal-buttons">
          <button type="submit" class="modal-submit">共有</button>
          <button type="button" class="modal-cancel" id="shareModalCancel">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
